<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#a6d975" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ぱくぱくタイマー" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>ぱくぱくタイマー</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/app-icon.svg.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="ぱくぱくタイマー">
      <div class="bunting" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <section class="stage">
        <div class="food-background" aria-hidden="true">
          <span class="food-sprinkle onigiri">🍙</span>
          <span class="food-sprinkle rice-bowl">🍚</span>
          <span class="food-sprinkle tamagoyaki">🍳</span>
          <span class="food-sprinkle yogurt-cup">🥣</span>
          <span class="food-sprinkle carrot">🥕</span>
          <span class="food-sprinkle strawberry">🍓</span>
          <span class="food-sprinkle broccoli">🥦</span>
          <span class="food-sprinkle spoon">🥄</span>
          <span class="food-sprinkle apple">🍎</span>
          <span class="food-sprinkle sandwich">🥪</span>
          <span class="food-sprinkle milk">🥛</span>
          <span class="food-sprinkle banana">🍌</span>
          <span class="food-sprinkle corn">🌽</span>
          <span class="food-sprinkle bento">🍱</span>
          <span class="food-sprinkle potato">🍠</span>
          <span class="food-sprinkle orange">🍊</span>
          <span class="food-sprinkle grape">🍇</span>
          <span class="food-sprinkle tomato">🍅</span>
          <span class="food-sprinkle cucumber">🥒</span>
          <span class="food-sprinkle bread">🍞</span>
          <span class="food-sprinkle cheese">🧀</span>
          <span class="food-sprinkle salad">🥗</span>
          <span class="food-sprinkle dumpling">🥟</span>
          <span class="food-sprinkle sushi">🍣</span>
          <span class="food-sprinkle pancake">🥞</span>
          <span class="food-sprinkle peanut">🥜</span>
          <span class="food-sprinkle kiwi">🥝</span>
          <span class="food-sprinkle cookie">🍪</span>
          <span class="food-sprinkle soup">🍲</span>
          <span class="food-sprinkle mushroom">🍄</span>
          <span class="food-sprinkle melon">🍈</span>
          <span class="food-sprinkle pear">🍐</span>
          <span class="food-sprinkle peach">🍑</span>
          <span class="food-sprinkle lemon">🍋</span>
          <span class="food-sprinkle pineapple">🍍</span>
          <span class="food-sprinkle avocado">🥑</span>
          <span class="food-sprinkle beans">🫘</span>
          <span class="food-sprinkle pepper">🫑</span>
          <span class="food-sprinkle onion">🧅</span>
          <span class="food-sprinkle garlic">🧄</span>
          <span class="food-sprinkle pretzel">🥨</span>
          <span class="food-sprinkle bagel">🥯</span>
          <span class="food-sprinkle waffle">🧇</span>
          <span class="food-sprinkle cupcake">🧁</span>
          <span class="food-sprinkle dumpling-two">🥟</span>
          <span class="food-sprinkle fishcake">🍥</span>
          <span class="food-sprinkle noodles">🍜</span>
          <span class="food-sprinkle stew">🍛</span>
          <span class="food-sprinkle tea">🍵</span>
          <span class="food-sprinkle juice">🧃</span>
          <span class="food-sprinkle rice-cracker">🍘</span>
          <span class="food-sprinkle dango">🍡</span>
          <span class="food-sprinkle shaved-ice">🍧</span>
          <span class="food-sprinkle ice-cream">🍨</span>
          <span class="food-sprinkle honey">🍯</span>
          <span class="food-sprinkle chestnut">🌰</span>
          <span class="food-sprinkle greens">🥬</span>
          <span class="food-sprinkle pea-pod">🫛</span>
          <span class="food-sprinkle fork-knife">🍴</span>
          <span class="food-sprinkle cup">☕</span>
          <span class="food-sprinkle croissant">🥐</span>
          <span class="food-sprinkle baguette">🥖</span>
          <span class="food-sprinkle flatbread">🫓</span>
          <span class="food-sprinkle meat">🥩</span>
          <span class="food-sprinkle shrimp">🍤</span>
          <span class="food-sprinkle fried-egg">🥚</span>
          <span class="food-sprinkle pot">🥘</span>
          <span class="food-sprinkle takoyaki">🧆</span>
          <span class="food-sprinkle pie">🥧</span>
          <span class="food-sprinkle custard">🍮</span>
          <span class="food-sprinkle lollipop">🍭</span>
          <span class="food-sprinkle candy">🍬</span>
          <span class="food-sprinkle chocolate">🍫</span>
          <span class="food-sprinkle popcorn">🍿</span>
          <span class="food-sprinkle salt">🧂</span>
        </div>
        <header class="hero">
          <h1 aria-label="ぱくぱくタイマー">
            <span>ぱ</span><span>く</span><span>ぱ</span><span>く</span><span>タイマー</span>
          </h1>
          <div class="total-time" aria-live="polite">
            <span>ぜんたい</span>
            <strong id="totalMinutes">14分</strong>
          </div>
        </header>

        <div class="content">
          <button
            class="settings-button"
            id="settingsButton"
            type="button"
            aria-label="時間を設定する"
            aria-expanded="false"
            aria-controls="settingsPanel"
          >
            <span aria-hidden="true">⚙</span>
            <small>設定</small>
          </button>

          <section class="timer-wrap" aria-label="食事タイマー">
            <svg class="meal-plate" viewBox="0 0 640 640" role="img" aria-labelledby="plateTitle plateDesc">
              <title id="plateTitle">3つに分かれた食事タイマー</title>
              <desc id="plateDesc">左がヨーグルト、真ん中が卵焼き、右がご飯です。</desc>
              <defs>
                <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
                  <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#8e744a" flood-opacity="0.22" />
                </filter>
              </defs>
              <circle cx="320" cy="320" r="292" class="plate-rim" />
              <circle cx="320" cy="320" r="270" class="plate-paper" />
              <g id="segments" filter="url(#softShadow)"></g>
              <circle cx="320" cy="320" r="98" class="mascot-ring" />
            </svg>

            <div class="food-label yogurt">
              <div class="food-icon" aria-hidden="true">🥣</div>
              <span>ヨーグルト</span>
              <strong id="yogurtRemaining">4分</strong>
            </div>
            <div class="food-label egg">
              <div class="food-icon" aria-hidden="true">🍳</div>
              <small>たまごや</small>
              <span>卵焼き</span>
              <strong id="eggRemaining">5分</strong>
            </div>
            <div class="food-label rice">
              <div class="food-icon" aria-hidden="true">🍚</div>
              <span>ごはん</span>
              <strong id="riceRemaining">5分</strong>
            </div>

            <div class="pakupaku" id="pakupaku" aria-label="パクパクくん">
              <div class="eye"></div>
              <div class="cheek"></div>
              <div class="mouth"></div>
            </div>
          </section>

          <aside class="side-panel" aria-label="パクパクくんの動き">
            <p>パクパクくんが<br />パクパク動くよ!</p>
            <div class="mascot-demo open" aria-hidden="true">
              <div class="mini-eye"></div>
              <div class="mini-cheek"></div>
              <div class="mini-mouth"></div>
            </div>
            <strong>あーん</strong>
            <div class="arrow" aria-hidden="true">↕</div>
            <div class="mascot-demo closed" aria-hidden="true">
              <div class="mini-eye"></div>
              <div class="mini-cheek"></div>
              <div class="mini-mouth"></div>
            </div>
            <strong class="green">ぱくっ</strong>
          </aside>

          <button class="sound-button" id="soundButton" type="button" aria-pressed="true" aria-label="音を切り替える">
            <span aria-hidden="true">♪</span>
            <small>おと</small>
          </button>
        </div>

        <section class="controls" aria-label="タイマー操作">
          <button id="startPauseButton" type="button">スタート</button>
          <button id="resetButton" type="button">リセット</button>
          <button id="testButton" type="button" aria-pressed="false">テスト</button>
        </section>

        <section class="extension-panel" id="extensionPanel" aria-label="延長中の操作" hidden>
          <button id="completeExtensionButton" type="button">完了</button>
        </section>

        <section class="settings" id="settingsPanel" aria-label="時間設定" hidden>
          <label>
            <span>ヨーグルト</span>
            <select id="yogurtInput" data-default-minutes="4" aria-label="ヨーグルトの時間"></select>
            <em>分</em>
          </label>
          <label>
            <span>卵焼き</span>
            <select id="eggInput" data-default-minutes="5" aria-label="卵焼きの時間"></select>
            <em>分</em>
          </label>
          <label>
            <span>ごはん</span>
            <select id="riceInput" data-default-minutes="5" aria-label="ごはんの時間"></select>
            <em>分</em>
          </label>
        </section>

        <section class="confirmation-panel" id="confirmationPanel" role="status" aria-live="polite" hidden>
          <span id="confirmationDoneFood">ごはん おしまい？</span>
          <strong id="confirmationNextFood">つぎは 卵焼き</strong>
          <div class="confirmation-actions" aria-label="区切り確認">
            <button id="nextFoodButton" type="button">つぎへ</button>
            <button id="extendFoodButton" type="button">もう1分</button>
          </div>
        </section>

        <div class="complete-message" id="completeMessage" role="status" aria-live="polite" hidden>
          <span>ごちそうさま!</span>
          <strong>ぜんぶ食べたよ</strong>
          <div class="spent-times" id="spentTimes" aria-label="かかったじかん" hidden></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
